<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>FreeCAD 電子零件盒參數命名字典</title>
<style>
:root{
  --bg:#f4f6f8;--panel:#fff;--text:#172033;--muted:#687386;--border:#d9dee7;
  --accent:#2563eb;--accent-soft:#eff6ff;--warn:#b45309;--danger:#b42318;
  --paused:#f8fafc;--shadow:0 8px 28px rgba(15,23,42,.08)
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
button{touch-action:manipulation}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.top{max-width:1320px;margin:auto;padding:11px 14px}
h1{font-size:1.1rem;margin:0 0 9px}
.controls{display:grid;grid-template-columns:minmax(220px,1fr) 160px 160px auto;gap:8px}
input,select,textarea{border:1px solid var(--border);border-radius:10px;padding:10px;background:white;color:var(--text);width:100%}
button{border:1px solid var(--border);border-radius:10px;padding:9px 12px;background:white;color:var(--text);cursor:pointer}
button.primary{background:var(--accent);color:white;border-color:var(--accent)}
button.soft{background:var(--accent-soft);border-color:#bfdbfe;color:#1d4ed8}
button.warn{color:var(--warn)}
main{max-width:1320px;margin:auto;padding:14px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.stats{font-size:.88rem;color:var(--muted);margin-left:auto;align-self:center}
.view-tabs{display:flex;gap:8px;margin-bottom:12px;overflow:auto;padding-bottom:2px}
.view-tabs button.active{background:#172033;color:white;border-color:#172033}
.section-title{font-size:.95rem;color:var(--muted);margin:18px 2px 8px}
.card-list{display:flex;flex-direction:column;gap:8px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:13px;box-shadow:var(--shadow);overflow:hidden}
.card.paused{background:var(--paused);opacity:.72}
.card.selected,.subgroup.selected>.subgroup-head,.project-card.selected{background:var(--accent-soft)}
.card,.project-card,.subgroup{position:relative}
.card.dragging,.project-card.dragging,.subgroup.dragging{
  z-index:30;box-shadow:0 8px 20px rgba(15,23,42,.18);
}
.ghost-stack{position:absolute;inset:0;background:var(--panel);border:1px solid var(--border);border-radius:inherit;pointer-events:none}
.count-badge{position:absolute;top:-8px;right:-8px;background:var(--accent);color:#fff;font-size:.72rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;z-index:5;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.subgroup-body.drop-target-hilite{outline:2px dashed var(--accent);outline-offset:-2px;background:var(--accent-soft)}
.sel-check{user-select:none;color:#94a3b8;font-size:1.15rem;padding:4px;cursor:pointer;flex:0 0 auto;display:flex}
.sel-check.on{color:var(--accent)}
.multiselect-btn.active{background:#172033;color:#fff;border-color:#172033}
.card-summary{display:grid;grid-template-columns:auto minmax(0,1fr) auto auto;align-items:center;gap:9px;padding:11px 12px;cursor:pointer}
.card-summary.has-sel{grid-template-columns:auto auto minmax(0,1fr) auto auto}
.drag-handle{user-select:none;color:#94a3b8;font-size:1.2rem;padding:4px;cursor:grab;touch-action:none;flex:0 0 auto}
.card-title{min-width:0}
.zh-title{font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.en-sub{font:0.78rem ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.card-flags{display:flex;gap:5px;align-items:center}
.badge{font-size:.72rem;background:#eef2f7;border-radius:999px;padding:4px 7px;color:#475569;white-space:nowrap}
.star{color:#d97706}
.chev{font-size:1rem;transition:.18s}
.card.expanded .chev{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid var(--border);padding:12px}
.card.expanded .card-body{display:block}
.name-code{font:700 1rem ui-monospace,SFMono-Regular,Consolas,monospace;word-break:break-all;background:#f8fafc;border:1px solid var(--border);padding:10px;border-radius:9px}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0}
.note-preview{font-size:.88rem;color:#475569;border-left:3px solid #cbd5e1;padding-left:8px;margin:10px 0;white-space:pre-wrap}
.actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.actions button{flex:0 0 auto}
.assign-btn{background:#ecfdf5;border-color:#a7f3d0;color:#047857}
.assignment-status{font-size:.82rem;color:var(--muted);margin-top:8px}
.project-board{display:grid;grid-template-columns:260px minmax(0,1fr);gap:12px}
.project-sidebar,.project-main{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
.project-list{display:flex;flex-direction:column;gap:6px}
.project-list button{text-align:left}
.project-list button.active{background:#172033;color:white;border-color:#172033}
.project-head{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.project-head h2{font-size:1rem;margin:0 auto 0 0}
#subgroupList{display:flex;flex-direction:column;gap:10px}
.subgroup{border:1px solid var(--border);border-radius:12px;background:#fafafa}
.subgroup-head{display:flex;gap:8px;align-items:center;padding:9px 10px;border-bottom:1px solid var(--border)}
.subgroup-head strong{flex:1}
.subgroup-body{padding:8px;min-height:48px;display:flex;flex-direction:column;gap:7px}
.project-card{background:white;border:1px solid var(--border);border-radius:10px;padding:9px;display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:8px;align-items:center}
.project-card.has-sel{grid-template-columns:auto auto minmax(0,1fr) auto}
.project-card .zh-title{font-size:.95rem}
.project-card .en-sub{font-size:.75rem}
.empty{text-align:center;color:var(--muted);padding:46px 12px}
dialog{border:none;border-radius:16px;padding:0;width:min(680px,calc(100vw - 22px));max-height:92vh;overflow:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);background:var(--panel);color:var(--text)}
dialog::backdrop{background:rgba(15,23,42,.55)}
.modal{padding:18px}
.modal h2{margin-top:0;font-size:1.1rem}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formgrid .full{grid-column:1/-1}
.modalfooter{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;position:sticky;bottom:0;background:var(--panel);padding-top:10px}
.settings-list{display:flex;flex-direction:column;gap:9px}
.setting-row{display:flex;gap:8px;align-items:center;justify-content:space-between;border:1px solid var(--border);padding:10px;border-radius:10px}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#111827;color:white;padding:10px 14px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s;z-index:60}
.toast.show{opacity:1}
.toast.success{background:#166534}
.toast.error{background:#991b1b}
.hidden{display:none!important}
@media(max-width:780px){
  .controls{grid-template-columns:1fr 1fr}
  .controls #search{grid-column:1/-1}
  .project-board{grid-template-columns:1fr}
  .project-sidebar{padding:9px}
  .project-list{flex-direction:row;overflow:auto}
  .project-list button{white-space:nowrap}
  .stats{width:100%;margin-left:0}
  .formgrid{grid-template-columns:1fr}
  .formgrid .full{grid-column:auto}
  .card-summary{grid-template-columns:auto minmax(0,1fr) auto}
  .card-flags{display:none}
  .toolbar button{flex:1 1 auto}
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0b1220;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--border:#2a3648;--accent:#3b82f6;--accent-soft:#102248;--paused:#0f172a;--shadow:none}
  header{background:rgba(17,24,39,.96)}
  input,select,textarea,button{background:#111827;color:#e5e7eb}
  .badge{background:#1f2937;color:#cbd5e1}
  .name-code{background:#0f172a}
  .subgroup{background:#0f172a}
  dialog,.modal{background:#111827;color:#e5e7eb}
  dialog input,dialog select,dialog textarea,dialog button{background:#0f172a;color:#e5e7eb;border-color:#334155}
  #pickerList .project-card{background:#0f172a;color:#e5e7eb;border-color:#334155}
  #pickerList .zh-title{color:#f8fafc}
  #pickerList .en-sub{color:#cbd5e1}
  .project-card{background:#111827;color:#e5e7eb}
  .assign-btn{background:#052e2b;border-color:#0f766e;color:#99f6e4}
  .note-preview{color:#cbd5e1}
}
</style>
</head>
<body>
<header>
<div class="top">
  <h1>FreeCAD 電子零件盒參數命名字典</h1>
  <div class="controls">
    <input id="search" type="search" placeholder="搜尋中文、英文、分類、標註…" autocomplete="off">
    <select id="category"><option value="">全部分類</option></select>
    <select id="statusFilter"><option value="active">啟用中</option><option value="all">全部狀態</option><option value="paused">已暫停</option></select>
    <button id="favOnly">☆ 僅顯示常用</button>
  </div>
</div>
</header>

<main>
  <div class="view-tabs">
    <button id="tabDictionary" class="active">命名字典</button>
    <button id="tabProjects">專案群組</button>
  </div>

  <section id="dictionaryView">
    <div class="toolbar">
      <button class="primary" id="addBtn">＋ 新增命名</button>
      <button id="collapseAllBtn">全部收折</button>
      <button id="expandAllBtn">全部展開</button>
      <button id="multiSelectDictBtn" class="multiselect-btn">多選</button>
      <button id="settingsBtn">設定</button>
      <span class="stats" id="stats"></span>
    </div>
    <div class="card-list" id="cardList"></div>
    <div class="empty" id="empty" hidden>找不到符合條件的命名。</div>
  </section>

  <section id="projectsView" class="hidden">
    <div class="project-board">
      <aside class="project-sidebar">
        <div class="toolbar">
          <button class="primary" id="addProjectBtn">＋ 新增專案</button>
        </div>
        <div class="project-list" id="projectList"></div>
      </aside>
      <section class="project-main">
        <div id="projectEmpty" class="empty">請先建立或選擇專案群組。</div>
        <div id="projectContent" class="hidden">
          <div class="project-head">
            <h2 id="projectTitle"></h2>
            <button id="renameProjectBtn">重新命名</button>
            <button id="addSubgroupBtn">＋ 小群組</button>
            <button id="addCardsToProjectBtn" class="soft">＋ 從字典加入字卡</button>
            <button id="multiSelectProjectBtn" class="multiselect-btn">多選</button>
            <button id="deleteProjectBtn" class="warn">移除專案</button>
          </div>
          <div id="subgroupList"></div>
        </div>
      </section>
    </div>
  </section>
</main>

<dialog id="editor">
<form method="dialog" class="modal" id="editForm">
  <h2 id="dialogTitle">新增命名</h2>
  <input type="hidden" id="editId">
  <div class="formgrid">
    <label>英文名稱<input id="fName" required placeholder="例如 KnobHoleDia"></label>
    <label>中文說明<input id="fZh" required placeholder="例如 旋鈕開孔直徑"></label>
    <label>分類<input id="fCategory" required placeholder="例如 旋鈕"></label>
    <label>尺寸類型<input id="fSuffix" placeholder="例如 Dia"></label>
    <label class="full">標籤（以逗號分隔）<input id="fTags" placeholder="例如 開孔, 面板, 圓孔"></label>
    <label>常用<select id="fFavorite"><option value="false">否</option><option value="true">是</option></select></label>
    <label>狀態<select id="fActive"><option value="true">啟用</option><option value="false">暫停</option></select></label>
    <label class="full">標註<textarea id="fNote" rows="4" placeholder="可記錄規格、來源、適用零件或加工注意事項"></textarea></label>
  </div>
  <div class="modalfooter">
    <button value="cancel">取消</button>
    <button class="primary" id="saveBtn" value="default">儲存</button>
  </div>
</form>
</dialog>

<dialog id="settingsDialog">
<div class="modal">
  <h2>設定</h2>
  <div class="settings-list">
    <div class="setting-row"><span>匯出全部字典、專案與設定</span><button id="exportBtn">匯出資料</button></div>
    <div class="setting-row"><span>從備份檔還原資料</span><button id="importBtn">匯入資料</button></div>
    <div class="setting-row"><span>還原內建字典並清除專案</span><button id="resetBtn" class="warn">還原字典</button></div>
  </div>
  <input id="fileInput" type="file" accept="application/json" hidden>
  <div class="modalfooter"><button onclick="settingsDialog.close()">關閉</button></div>
</div>
</dialog>

<dialog id="projectDialog">
<form method="dialog" class="modal">
  <h2 id="projectDialogTitle">新增專案</h2>
  <input type="hidden" id="projectEditId">
  <label>專案名稱<input id="projectName" required placeholder="例如 淨水器控制盒"></label>
  <div class="modalfooter"><button value="cancel">取消</button><button id="saveProjectBtn" class="primary" value="default">儲存</button></div>
</form>
</dialog>

<dialog id="subgroupDialog">
<form method="dialog" class="modal">
  <h2>新增小群組</h2>
  <label>小群組名稱<input id="subgroupName" required placeholder="例如 前面板、PCB 固定、電池盒"></label>
  <div class="modalfooter"><button value="cancel">取消</button><button id="saveSubgroupBtn" class="primary" value="default">儲存</button></div>
</form>
</dialog>

<dialog id="assignDialog">
<div class="modal">
  <h2>指派字卡到專案</h2>
  <div class="name-code" id="assignCardName"></div>
  <div class="formgrid" style="margin-top:12px">
    <label>專案群組
      <select id="assignProject"></select>
    </label>
    <label>小群組
      <select id="assignSubgroup"></select>
    </label>
  </div>
  <div id="assignInfo" class="note-preview" style="margin-top:12px"></div>
  <div class="modalfooter">
    <button onclick="assignDialog.close()">取消</button>
    <button id="confirmAssignBtn" class="primary">加入</button>
  </div>
</div>
</dialog>

<dialog id="pickerDialog">
<div class="modal">
  <h2>從字典加入字卡</h2>
  <input id="pickerSearch" type="search" placeholder="搜尋命名">
  <label style="display:block;margin-top:10px">加入到小群組
    <select id="pickerSubgroup"></select>
  </label>
  <div id="pickerList" class="card-list" style="margin-top:10px;max-height:52vh;overflow:auto"></div>
  <div class="modalfooter"><button onclick="pickerDialog.close()">完成</button></div>
</div>
</dialog>

<div class="toast" id="toast"></div>

function normalizeState(raw){
  const dict = Array.isArray(raw?.items) ? raw.items : (Array.isArray(raw) ? raw : structuredClone(BUILTIN));
  const items = dict.map((x,i)=>({
    id:Number(x.id)||i+1,
    category:x.category||'未分類',
    name:x.name||'Unnamed',
    zh:x.zh||x.name||'未命名',
    suffix:x.suffix||'',
    tags:Array.isArray(x.tags)?x.tags:(x.group?[x.group]:[]),
    favorite:Boolean(x.favorite),
    note:x.note||'',
    active:x.active!==false,
    order:Number.isFinite(x.order)?x.order:i
  }));
  return {
    items,
    projects:Array.isArray(raw?.projects)?raw.projects:[],
    nextProjectId:Number(raw?.nextProjectId)||1,
    nextSubgroupId:Number(raw?.nextSubgroupId)||1
  };
}
function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem(KEY));
    if(saved) return normalizeState(saved);
    const old=JSON.parse(localStorage.getItem('freecad_param_dictionary_v1'));
    return normalizeState(old || {items:structuredClone(BUILTIN)});
  }catch(e){ return normalizeState({items:structuredClone(BUILTIN)}); }
}
function saveState(){ try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){console.warn('無法寫入瀏覽器儲存空間',e)} }
function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.remove('success','error');
  if(type) el.classList.add(type);
  el.classList.add('show');
  clearTimeout(window.__toast);
  window.__toast=setTimeout(()=>{
    el.classList.remove('show','success','error');
  },1800);
}
/* ---------- 共用：相片風格＋多選堆疊拖曳排序 ---------- */
const DRAG_V={scale:1.04,shadow:'0 8px 20px rgba(15,23,42,.22)',rotate:' rotate(-1.5deg)'};
function heightCache(container,selector){
  const m=new Map();
  container.querySelectorAll(selector).forEach(el=>{
    const id=Number(el.dataset.id ?? el.dataset.cardId ?? el.dataset.subgroupId);
    if(!el.classList.contains('dragging'))m.set(id,el.getBoundingClientRect().height);
  });
  return m;
}
function indexByPointer(container,otherIds,cache,gap,clientY,fallback=56){
  const rect=container.getBoundingClientRect();
  const y=clientY-rect.top;
  let cum=0;
  for(let i=0;i<otherIds.length;i++){
    const h=cache.get(otherIds[i])||fallback;
    if(y<cum+h/2)return i;
    cum+=h+gap;
  }
  return otherIds.length;
}
function mergeReorderedSubset(fullIds,visibleIdsOriginal,newVisibleSeq){
  const positions=visibleIdsOriginal.map(id=>fullIds.indexOf(id)).sort((a,b)=>a-b);
  const out=[...fullIds];
  newVisibleSeq.forEach((id,i)=>{ out[positions[i]]=id; });
  return out;
}
function addStack(el,count){
  el.querySelectorAll('.ghost-stack').forEach(g=>g.remove());
  const layers=Math.min(count-1,2);
  for(let i=layers;i>=1;i--){
    const g=document.createElement('div');
    g.className='ghost-stack';
    g.style.transform='translate('+(i*5)+'px,'+(i*5)+'px) rotate('+(i*3)+'deg)';
    g.style.opacity=String(0.9-i*0.18);
    el.insertBefore(g,el.firstChild);
  }
  const old=el.querySelector('.count-badge');if(old)old.remove();
  if(count>1){
    const badge=document.createElement('span');
    badge.className='count-badge';badge.textContent=String(count);
    el.appendChild(badge);
  }
}
function setDragVisual(el,dy){
  el.style.transform='translateY('+dy+'px) scale('+DRAG_V.scale+')'+DRAG_V.rotate;
  el.style.boxShadow=DRAG_V.shadow;
}
function clearDragVisual(el){
  el.style.transition='transform .22s cubic-bezier(.2,.8,.3,1.2)';
  el.style.transform='';el.style.boxShadow='';
  setTimeout(()=>{el.style.zIndex='';el.style.transition='';},220);
}
function flipOthers(container,selector,firstRects,excludeIds){
  container.querySelectorAll(selector).forEach(r=>{
    const id=Number(r.dataset.id ?? r.dataset.cardId ?? r.dataset.subgroupId);
    if(excludeIds.includes(id))return;
    const first=firstRects.get(id);if(!first)return;
    const last=r.getBoundingClientRect();
    const delta=first.top-last.top;
    if(delta){
      r.style.transition='none';r.style.transform='translateY('+delta+'px)';
      requestAnimationFrame(()=>{
        r.style.transition='transform .22s cubic-bezier(.2,.8,.3,1.2)';
        r.style.transform='';
      });
    }
  });
}
function captureRects(container,selector){
  const m=new Map();
  container.querySelectorAll(selector).forEach(r=>{
    const id=Number(r.dataset.id ?? r.dataset.cardId ?? r.dataset.subgroupId);
    m.set(id,r.getBoundingClientRect());
  });
  return m;
}
async function copyText(text){
  const value=String(text ?? '');
  let copied=false;
  let verified=false;

  // HTTPS／localhost 優先使用 Clipboard API。
  if(navigator.clipboard && window.isSecureContext){
    try{
      await navigator.clipboard.writeText(value);
      copied=true;

      // 瀏覽器允許讀回剪貼簿時，實際比對內容。
      if(typeof navigator.clipboard.readText==='function'){
        try{
          const readBack=await navigator.clipboard.readText();
          verified=readBack===value;
        }catch(e){
          // 部分瀏覽器只允許寫入，不允許讀回；寫入成功仍算完成。
        }
      }
    }catch(e){
      copied=false;
    }
  }

  // file://、部分平板瀏覽器或權限受限時，改用傳統複製方式。
  if(!copied){
    const ta=document.createElement('textarea');
    ta.value=value;
    ta.setAttribute('readonly','');
    ta.style.position='fixed';
    ta.style.left='-9999px';
    ta.style.top='0';
    ta.style.opacity='0';
    document.body.appendChild(ta);
    ta.focus({preventScroll:true});
    ta.select();
    ta.setSelectionRange(0,ta.value.length);
    try{
      copied=document.execCommand('copy');
    }catch(e){
      copied=false;
    }
    ta.remove();
  }

  if(copied){
    toast(verified ? `已複製並驗證：${value}` : `已複製：${value}`,'success');
    if(navigator.vibrate) navigator.vibrate(35);
    return true;
  }

  // 最後備援：顯示可手動複製的文字，不假裝成功。
  try{
    showCopyFallback(value);
  }catch(e){
    console.error('顯示手動複製視窗失敗',e);
    toast('複製失敗，請手動選取英文名稱','error');
  }
  return false;
}
function showCopyFallback(value){
  const existing=document.getElementById('copyFallbackDialog');
  if(existing) existing.remove();
  const dlg=document.createElement('dialog');
  dlg.id='copyFallbackDialog';
  dlg.innerHTML=`<div class="modal">
    <h2>無法自動複製</h2>
    <p style="color:var(--muted)">瀏覽器阻擋了剪貼簿存取。請長按或全選下方文字後複製。</p>
    <textarea id="copyFallbackText" rows="3" readonly>${esc(value)}</textarea>
    <div class="modalfooter"><button onclick="copyFallbackDialog.close()">關閉</button></div>
  </div>`;
  document.body.appendChild(dlg);
  dlg.showModal();
  const field=document.getElementById('copyFallbackText');
  field.focus();
  field.select();
  field.setSelectionRange(0,field.value.length);
  toast('自動複製失敗，請手動複製','error');
}
function sortedItems(){
  return [...state.items].sort((a,b)=>{
    if(a.active!==b.active) return a.active?-1:1;
    return a.order-b.order || a.id-b.id;
  });
}
function refreshCategoryOptions(){
  const el=document.getElementById('category'), current=el.value;
  const cats=[...new Set(state.items.map(x=>x.category))].sort((a,b)=>a.localeCompare(b,'zh-Hant'));
  el.innerHTML='<option value="">全部分類</option>'+cats.map(x=>`<option>${esc(x)}</option>`).join('');
  el.value=cats.includes(current)?current:'';
}
function filteredItems(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const category=document.getElementById('category').value;
  const status=document.getElementById('statusFilter').value;
  return sortedItems().filter(x=>{
    const hay=[x.name,x.zh,x.category,x.suffix,...x.tags,x.note].join(' ').toLowerCase();
    return (!q||hay.includes(q)) && (!category||x.category===category) &&
      (status==='all'||(status==='active'?x.active:!x.active)) && (!favOnly||x.favorite);
  });
}

}

let dictDrag=null;
function startPointerDrag(e){
  if(e.pointerType==='mouse' && e.button!==0) return;
  e.preventDefault();
  const card=e.currentTarget.closest('.card');
  const id=Number(card.dataset.id);
  const primary=state.items.find(x=>x.id===id);
  const group=(dictSelectMode&&selectedDictIds.has(id)&&selectedDictIds.size>1)
    ? sortedItems().filter(x=>selectedDictIds.has(x.id)&&x.active===primary.active).map(x=>x.id)
    : [id];
  const cardListEl=document.getElementById('cardList');
  const gap=parseFloat(getComputedStyle(cardListEl).rowGap)||8;
  const cache=heightCache(cardListEl,'.card');
  dictDrag={ids:group,primary:id,pointerId:e.pointerId,startY:e.clientY,cache,gap,lastIndex:null};
  card.setPointerCapture(e.pointerId);
  card.classList.add('dragging');card.style.zIndex='30';card.style.transition='none';
  if(group.length>1){
    document.querySelectorAll('.card').forEach(c=>{if(group.includes(Number(c.dataset.id))&&Number(c.dataset.id)!==id)c.style.display='none'});
    addStack(card,group.length);
  }
  window.addEventListener('pointermove',dictPointerMove);
  window.addEventListener('pointerup',dictPointerUp,{once:true});
}
function dictPointerMove(e){
  if(!dictDrag)return;
  const cardListEl=document.getElementById('cardList');
  const card=cardListEl.querySelector('.card[data-id="'+dictDrag.primary+'"]');
  if(!card)return;
  const dy=e.clientY-dictDrag.startY;
  setDragVisual(card,dy);
  const primary=state.items.find(x=>x.id===dictDrag.primary);
  const shownIds=filteredItems().filter(x=>x.active===primary.active).map(x=>x.id);
  const otherIds=shownIds.filter(x=>!dictDrag.ids.includes(x));
  const newIndex=indexByPointer(cardListEl,otherIds,dictDrag.cache,dictDrag.gap,e.clientY);
  if(newIndex===dictDrag.lastIndex)return;
  dictDrag.lastIndex=newIndex;
  const newVisibleSeq=[...otherIds];
  newVisibleSeq.splice(newIndex,0,...dictDrag.ids);
  const trueIds=sortedItems().filter(x=>x.active===primary.active).map(x=>x.id);
  const merged=mergeReorderedSubset(trueIds,shownIds,newVisibleSeq);
  const activeIds=primary.active?merged:sortedItems().filter(x=>x.active).map(x=>x.id);
  const pausedIds=!primary.active?merged:sortedItems().filter(x=>!x.active).map(x=>x.id);
  [...activeIds,...pausedIds].forEach((iid,i)=>{const it=state.items.find(x=>x.id===iid);if(it)it.order=i});
  const firstRects=captureRects(cardListEl,'.card');
  renderDictionary();
  const newCard=document.querySelector('.card[data-id="'+dictDrag.primary+'"]');
  if(newCard){
    newCard.classList.add('dragging');newCard.style.zIndex='30';newCard.style.transition='none';
    setDragVisual(newCard,dy);
    try{newCard.setPointerCapture(dictDrag.pointerId);}catch(err){}
    if(dictDrag.ids.length>1){
      document.querySelectorAll('.card').forEach(c=>{if(dictDrag.ids.includes(Number(c.dataset.id))&&Number(c.dataset.id)!==dictDrag.primary)c.style.display='none'});
      addStack(newCard,dictDrag.ids.length);
    }
    flipOthers(document.getElementById('cardList'),'.card',firstRects,dictDrag.ids);
  }
}
function dictPointerUp(){
  if(!dictDrag)return;
  const card=document.querySelector('.card[data-id="'+dictDrag.primary+'"]');
  if(card){card.classList.remove('dragging');clearDragVisual(card);}
  window.removeEventListener('pointermove',dictPointerMove);

}

let cardDrag=null;
function startCardDrag(e){
  if(e.pointerType==='mouse'&&e.button!==0)return;
  e.preventDefault();
  const el=e.currentTarget.closest('.project-card');
  const cid=Number(el.dataset.cardId);
  const gid=Number(el.dataset.subgroupId);
  const p=currentProject();
  const fullOrder=[];p.subgroups.forEach(g=>g.cardIds.forEach(id=>fullOrder.push(id)));
  const group=(projectSelectMode&&selectedCardIds.has(cid)&&selectedCardIds.size>1)
    ? fullOrder.filter(id=>selectedCardIds.has(id))
    : [cid];
  const cache=heightCache(document.getElementById('subgroupList'),'.project-card');
  const gap=parseFloat(getComputedStyle(el.parentElement).rowGap)||7;
  cardDrag={ids:group,primary:cid,fromSubgroupId:gid,pointerId:e.pointerId,startY:e.clientY,cache,gap,lastKey:null};
  el.setPointerCapture(e.pointerId);
  el.classList.add('dragging');el.style.zIndex='30';el.style.transition='none';
  if(group.length>1){
    document.querySelectorAll('.project-card').forEach(c=>{if(group.includes(Number(c.dataset.cardId))&&Number(c.dataset.cardId)!==cid)c.style.display='none'});
    addStack(el,group.length);
  }
  window.addEventListener('pointermove',cardPointerMove);
  window.addEventListener('pointerup',cardPointerUp,{once:true});
}
function cardPointerMove(e){
  if(!cardDrag)return;
  const el=document.querySelector('.project-card[data-card-id="'+cardDrag.primary+'"]');
  if(!el)return;
  const dy=e.clientY-cardDrag.startY;
  setDragVisual(el,dy);
  document.querySelectorAll('.subgroup-body').forEach(b=>b.classList.remove('drop-target-hilite'));
  const body=document.elementFromPoint(e.clientX,e.clientY)?.closest('[data-drop-subgroup]');
  if(!body)return;
  const destGid=Number(body.dataset.dropSubgroup);
  const p=currentProject();
  const dest=p.subgroups.find(g=>g.id===destGid);
  if(!dest)return;
  const otherIds=dest.cardIds.filter(x=>!cardDrag.ids.includes(x));
  const newIndex=indexByPointer(body,otherIds,cardDrag.cache,cardDrag.gap,e.clientY,52);
  const key=destGid+'|'+newIndex;
  if(key!==cardDrag.lastKey){
    cardDrag.lastKey=key;
    p.subgroups.forEach(g=>{g.cardIds=g.cardIds.filter(id=>!cardDrag.ids.includes(id))});
    dest.cardIds.splice(newIndex,0,...cardDrag.ids);
    const firstRects=captureRects(document.getElementById('subgroupList'),'.project-card');
    renderProject();
    const newEl=document.querySelector('.project-card[data-card-id="'+cardDrag.primary+'"]');
    if(newEl){
      newEl.classList.add('dragging');newEl.style.zIndex='30';newEl.style.transition='none';
      setDragVisual(newEl,dy);
      try{newEl.setPointerCapture(cardDrag.pointerId);}catch(err){}
      if(cardDrag.ids.length>1){
        document.querySelectorAll('.project-card').forEach(c=>{if(cardDrag.ids.includes(Number(c.dataset.cardId))&&Number(c.dataset.cardId)!==cardDrag.primary)c.style.display='none'});
        addStack(newEl,cardDrag.ids.length);
      }
      flipOthers(document.getElementById('subgroupList'),'.project-card',firstRects,cardDrag.ids);
    }
  }
  document.querySelector('.subgroup-body[data-drop-subgroup="'+destGid+'"]')?.classList.add('drop-target-hilite');
}
function cardPointerUp(){
  if(!cardDrag)return;
  const el=document.querySelector('.project-card[data-card-id="'+cardDrag.primary+'"]');
  if(el){el.classList.remove('dragging');clearDragVisual(el);}
  document.querySelectorAll('.subgroup-body').forEach(b=>b.classList.remove('drop-target-hilite'));
  window.removeEventListener('pointermove',cardPointerMove);
  saveState();cardDrag=null;
  setTimeout(()=>{renderProject();renderDictionary();},220);
}

addBtn.onclick=()=>editItem(null);
collapseAllBtn.onclick=()=>{expandedIds.clear();renderDictionary()};
expandAllBtn.onclick=()=>{filteredItems().forEach(x=>expandedIds.add(x.id));renderDictionary()};
search.oninput=renderDictionary;category.onchange=renderDictionary;statusFilter.onchange=renderDictionary;
favOnlyBtn=favOnly;document.getElementById('favOnly').onclick=()=>{favOnly=!favOnly;renderDictionary()};
settingsBtn.onclick=()=>settingsDialog.showModal();

addProjectBtn.onclick=()=>newProject();
renameProjectBtn.onclick=()=>{if(currentProject())newProject(currentProject().id)};
addSubgroupBtn.onclick=addSubgroup;
addCardsToProjectBtn.onclick=openPicker;
pickerSearch.oninput=renderPicker;
assignProject.onchange=refreshAssignSubgroups;
confirmAssignBtn.onclick=()=>{
  const p=state.projects.find(p=>p.id===Number(assignProject.value));
  const g=p?.subgroups.find(g=>g.id===Number(assignSubgroup.value));
  if(!p||!g){toast('請先建立小群組');return}
  if(g.cardIds.includes(assigningCardId)){
    toast('這張字卡已在該小群組');
    return;
  }
  g.cardIds.push(assigningCardId);
  activeProjectId=p.id;
  saveState();
  assignDialog.close();
  renderDictionary();
  renderProjects();
  toast(`已加入：${p.name}／${g.name}`);
};
deleteProjectBtn.onclick=()=>{
  const p=currentProject();if(!p||!confirm(`移除專案「${p.name}」？字典資料不會刪除。`))return;
  state.projects=state.projects.filter(x=>x.id!==p.id);activeProjectId=state.projects[0]?.id||null;saveState();renderProjects();
};

exportBtn.onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='FreeCAD_參數命名字典_完整備份.json';a.click();URL.revokeObjectURL(a.href);
};
importBtn.onclick=()=>fileInput.click();
fileInput.onchange=async e=>{
  const file=e.target.files[0];if(!file)return;
  try{state=normalizeState(JSON.parse(await file.text()));saveState();activeProjectId=state.projects[0]?.id||null;expandedIds.clear();renderDictionary();renderProjects();toast('匯入完成')}
  catch(err){alert('匯入失敗：檔案格式不正確。')}
  e.target.value='';
};
resetBtn.onclick=()=>{
  if(!confirm('還原內建字典會覆蓋目前字典並清除所有專案群組。請先匯出備份。確定繼續？'))return;
  state=normalizeState({items:structuredClone(BUILTIN),projects:[]});activeProjectId=null;expandedIds.clear();saveState();settingsDialog.close();renderDictionary();renderProjects();toast('已還原內建字典');
};

renderDictionary();
renderProjects();
</script>
</body>
</html>
